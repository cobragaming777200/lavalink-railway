server:
  port: ${PORT:2333}
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false

  server:
    password: "${LAVALINK_PASSWORD:youshallnotpass}"

    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    clients:
      - ANDROID_VR
      - TVHTML5_SIMPLY
      - MUSIC

logging:
  level:
    root: INFO
    lavalink: INFO
    dev.lavalink.youtube: INFO